name: Deploy docs

# Builds the Docusaurus site in docs/ and publishes it to GitHub Pages
# (https://logaan.github.io/wavelet/). The wasm-compiled interpreter that powers
# the live playground is committed under docs/src/wasm, so this job needs only
# Node — no Rust toolchain. Regenerate that artifact and docs/examples.json
# locally (see scripts/regen-examples.sh) when the language changes.
#
# The build itself lives in scripts/build-docs.sh so it can be run identically
# from a local checkout.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: scripts/build-docs.sh
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
