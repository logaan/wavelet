name: Release

# On a version tag (e.g. v0.1.0), package the editor tooling under tooling/ into
# one zip per editor and publish them as assets on a GitHub release. The assets
# use stable, unversioned names so the install instructions in README.md can
# always point at .../releases/latest/download/wavelet-<editor>.zip.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package editor tooling
        run: |
          set -euo pipefail
          mkdir -p dist

          # Vim/Neovim runtime package -> unzips to a `wavelet/` dir you drop
          # into pack/*/start.
          rm -rf stage && mkdir -p stage/wavelet
          cp -R tooling/vim/. stage/wavelet/
          (cd stage && zip -r ../dist/wavelet-vim.zip wavelet)

          # VS Code extension -> unzips to a `wavelet/` dir you drop into the
          # extensions folder.
          rm -rf stage && mkdir -p stage/wavelet
          cp -R tooling/vscode/. stage/wavelet/
          (cd stage && zip -r ../dist/wavelet-vscode.zip wavelet)

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wavelet-vim.zip
            dist/wavelet-vscode.zip
          generate_release_notes: true
