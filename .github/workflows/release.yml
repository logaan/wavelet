name: Release

# On a version tag (e.g. v0.1.0):
#   * build the Wavelet CLI (`wavelet`) and language server (`wavelet-lsp`) for
#     the common desktop platforms, publishing them standalone and bundled
#     per-platform into wavelet-<target>.tar.gz for the Homebrew formula, and
#   * package the VS Code extension (tooling/vscode) into a zip,
# then publish all of them as assets on a GitHub release. Assets use stable,
# unversioned names so install instructions can always point at
# .../releases/latest/download/<asset>.
#
# Partial builds still ship: the matrix does not fail-fast, and the release job
# runs even if some target legs fail, publishing whatever artifacts exist. So a
# flaky platform never blocks the whole release.
#
# The release body is the curated CHANGELOG.md section for the tag, extracted by
# scripts/changelog-section.sh; keep CHANGELOG.md up to date before tagging.
#
# The build/packaging steps live in scripts/build-cli.sh, scripts/build-lsp.sh
# and scripts/package-tooling.sh so they can be run identically from a local
# checkout.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Build both binaries per target. Each platform builds natively on its own
  # runner; the one exception is macOS x86_64, cross-built on the arm runner
  # (pure-Rust crate, links fine) so we don't depend on the flaky Intel runners.
  # fail-fast is off so one target's failure never cancels the others.
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Build and stage wavelet (CLI)
        shell: bash
        run: scripts/build-cli.sh ${{ matrix.target }}

      - name: Build and stage wavelet-lsp
        shell: bash
        run: scripts/build-lsp.sh ${{ matrix.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: bins-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    # Run even if some build legs failed, so a partial set of binaries still
    # ships a release.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bins-*
          path: staged-bins
          merge-multiple: true

      - name: Package editor tooling, collect binaries, bundle tarballs
        run: scripts/package-tooling.sh
        env:
          STAGED_BINS: staged-bins

      # Use the curated CHANGELOG.md section for this tag as the release body.
      # Fails the release if the tag has no section, so we never publish empty
      # or stale notes. generate_release_notes appends the auto "Full Changelog"
      # compare link beneath the curated notes.
      - name: Extract changelog section for ${{ github.ref_name }}
        run: scripts/changelog-section.sh "${{ github.ref_name }}" > release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # One glob covers the vscode zip, the standalone CLI/LSP binaries, and
          # the per-platform tarballs. Don't fail on missing files: a partial
          # build legitimately produces a subset.
          files: dist/wavelet-*
          fail_on_unmatched_files: false
          body_path: release-notes.md
          generate_release_notes: true
