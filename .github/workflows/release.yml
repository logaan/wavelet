name: Release

# On a version tag (e.g. v0.1.0):
#   * cross-compile the language server (tooling/wavelet-lsp) for the common
#     desktop platforms (published standalone, and used by the Neovim plugin
#     from PATH), and
#   * package the VS Code extension (tooling/vscode) into a zip,
# then publish all of them as assets on a GitHub release. Assets use stable,
# unversioned names so the install instructions in README.md can always point at
# .../releases/latest/download/<asset>.
#
# The build/packaging steps live in scripts/build-lsp.sh and
# scripts/package-tooling.sh so they can be run identically from a local
# checkout.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Build the language-server binary natively on each platform's own runner, so
  # we never need a cross toolchain. Each build is uploaded as a workflow
  # artifact for the `release` job to collect.
  build-lsp:
    name: Build wavelet-lsp (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Build and stage wavelet-lsp
        shell: bash
        run: scripts/build-lsp.sh ${{ matrix.target }}

      - uses: actions/upload-artifact@v5
        with:
          name: wavelet-lsp-${{ matrix.target }}
          path: dist/*

  release:
    needs: build-lsp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download LSP binaries
        uses: actions/download-artifact@v5
        with:
          pattern: wavelet-lsp-*
          path: lsp-artifacts
          merge-multiple: true

      - name: Package editor tooling and collect LSP binaries
        run: scripts/package-tooling.sh
        env:
          LSP_BIN_DIR: lsp-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wavelet-vscode.zip
            dist/wavelet-lsp-*
          fail_on_unmatched_files: true
          generate_release_notes: true
